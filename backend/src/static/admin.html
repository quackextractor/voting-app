<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Coffee Poll</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        primary: '#3b82f6',
                        destructive: '#ef4444',
                    }
                }
            }
        }
    </script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>

<body class="bg-slate-50 min-h-screen">
    <!-- Unified Navigation Panel -->
    <nav class="sticky top-0 z-50 bg-white/80 backdrop-blur-md border-b border-slate-200">
        <div class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16">
                <div class="flex items-center space-x-8">
                    <a href="/" class="flex items-center text-slate-900 font-extrabold text-lg">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"
                            class="text-blue-600 mr-2">
                            <path d="M17 8h1a4 4 0 1 1 0 8h-1" />
                            <path d="M3 8h14v9a4 4 0 0 1-4 4H7a4 4 0 0 1-4-4Z" />
                            <line x1="6" y1="2" x2="6" y2="4" />
                            <line x1="10" y1="2" x2="10" y2="4" />
                            <line x1="14" y1="2" x2="14" y2="4" />
                        </svg> Coffee Poll
                    </a>
                    <div class="hidden sm:flex space-x-4">
                        <a href="/"
                            class="px-3 py-2 rounded-md text-sm font-medium text-slate-500 hover:text-blue-600 hover:bg-slate-100 transition-all">Poll</a>
                        <a href="/admin"
                            class="px-3 py-2 rounded-md text-sm font-medium text-blue-600 bg-blue-50">Admin</a>
                        <a href="/monitor"
                            class="px-3 py-2 rounded-md text-sm font-medium text-slate-500 hover:text-blue-600 hover:bg-slate-100 transition-all">Monitor</a>
                        <a href="/docs"
                            class="px-3 py-2 rounded-md text-sm font-medium text-slate-500 hover:text-blue-600 hover:bg-slate-100 transition-all">Docs</a>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <div class="max-w-4xl mx-auto py-12 px-4 sm:px-6 lg:px-8">
        <div class="mb-8">
            <a href="/"
                class="inline-flex items-center text-slate-600 hover:text-primary transition-colors font-medium">
                <svg xmlns="http://www.w3.org/2000/svg" class="mr-2 h-4 w-4" fill="none" viewBox="0 0 24 24"
                    stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M10 19l-7-7m0 0l7-7m-7 7h18" />
                </svg>
                Back to Poll
            </a>
        </div>

        <div class="bg-white rounded-2xl shadow-xl p-8 border border-slate-100">
            <header class="mb-8 border-b border-slate-100 pb-6 text-center">
                <h1 class="text-3xl font-extrabold text-slate-900">Admin Control Panel</h1>
                <p class="text-slate-500 mt-2">Manage poll status and system settings.</p>
            </header>

            <div id="reset-card"
                class="w-full max-w-md mx-auto mt-8 p-6 rounded-xl shadow-md border border-red-100 bg-red-50">
                <h2 class="text-red-600 text-xl font-bold mb-2">Admin: Reset Poll</h2>
                <p class="text-slate-600 text-sm mb-6">
                    Enter the secret token to clear all votes. This action cannot be undone.
                </p>

                <div class="flex flex-col space-y-4">
                    <input type="password" id="token" placeholder="Secret Token"
                        class="w-full px-4 py-2 rounded-lg border border-slate-200 focus:outline-none focus:ring-2 focus:ring-red-500 transition-all">
                    <button id="reset-btn"
                        class="w-full bg-red-600 hover:bg-red-700 text-white font-bold py-2 px-4 rounded-lg transition-colors disabled:opacity-50 disabled:cursor-not-allowed">
                        Reset Results
                    </button>
                    <p id="message" class="text-sm font-medium mt-2 hidden"></p>
                </div>
            </div>
        </div>

        <footer class="mt-20 text-center text-slate-400 text-sm">
            <p>&copy; 2026 Coffee Poll Project. Admin Access.</p>
        </footer>
    </div>

    <script>
        const resetBtn = document.getElementById('reset-btn');
        const tokenInput = document.getElementById('token');
        const messagePara = document.getElementById('message');

        resetBtn.addEventListener('click', async () => {
            const token = tokenInput.value;
            if (!token) return;

            resetBtn.disabled = true;
            resetBtn.innerText = 'Resetting...';
            messagePara.classList.add('hidden');

            try {
                const response = await fetch('/api/reset', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ token }),
                });

                const data = await response.json();

                messagePara.classList.remove('hidden');
                if (response.ok) {
                    messagePara.innerText = 'Success: Poll has been reset!';
                    messagePara.className = 'text-sm font-medium mt-2 text-green-600';
                    tokenInput.value = '';
                } else {
                    messagePara.innerText = 'Error: ' + (data.message || 'Invalid token');
                    messagePara.className = 'text-sm font-medium mt-2 text-red-600';
                }
            } catch (err) {
                messagePara.classList.remove('hidden');
                messagePara.innerText = 'Error: Server communication failed';
                messagePara.className = 'text-sm font-medium mt-2 text-red-600';
            } finally {
                resetBtn.disabled = false;
                resetBtn.innerText = 'Reset Results';
            }
        });
    </script>
</body>

</html>
